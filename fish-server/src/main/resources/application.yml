server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${fish.datasource.driver-class-name}
      url: jdbc:mysql://${fish.datasource.host}:${fish.datasource.port}/${fish.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${fish.datasource.username}
      password: ${fish.datasource.password}
  redis:
    host: ${fish.redis.host}
    port: ${fish.redis.port}

mybatis-plus:
  type-aliases-package: com.fish.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com:
      fish:
        mapper: debug
        service: info
        controller: info

fish:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    # 设置用户的
    user-secret-key: itcast
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${fish.alioss.endpoint}
    access-key: ${fish.alioss.access-key}
    secret-key: ${fish.alioss.secret-key}
    bucket-name: ${fish.alioss.bucket-name}
  wechat:
    appid: ${fish.wechat.app-id}
    secret: ${fish.wechat.app-secret}


